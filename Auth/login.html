<!-- LOGIN SECTION -->
<section class="section" id="login">
  <div class="container" style="max-width:400px;">
    <div style="background:white;padding:36px;border-radius:var(--radius);box-shadow:var(--shadow);border-top:5px solid var(--gold);">
      <h2 style="text-align:center;font-family:'Playfair Display',serif;color:var(--green-dark);margin-bottom:20px;">Injira mu rubuga</h2>
      
      <form>
        <div style="margin-bottom:16px;">
          <label for="email" style="display:block;font-weight:700;margin-bottom:6px;">Imeyili</label>
          <input type="email" id="email" placeholder="Andika imeyili yawe" 
                 style="width:100%;padding:12px 16px;border-radius:999px;border:1px solid #ccc;outline:none;font-size:14px;">
        </div>
        
        <div style="margin-bottom:16px;">
          <label for="password" style="display:block;font-weight:700;margin-bottom:6px;">Umubare banga</label>
          <input type="password" id="password" placeholder="Andika umubare banga wawe"
                 style="width:100%;padding:12px 16px;border-radius:999px;border:1px solid #ccc;outline:none;font-size:14px;">
        </div>
        
        <button type="submit" style="width:100%;padding:14px 0;background:var(--gold);color:var(--green-dark);
                                      border:none;border-radius:999px;font-weight:700;font-size:16px;cursor:pointer;transition:.2s;">
          Fungura
        </button>

         <div style="display:flex;justify-content:center;align-items:center;margin-bottom:20px;margin-top: 20px; font-size:13px;">
          <!-- <label><input type="checkbox"> Uranyibuka</label> -->
          <a href="forgot-password.html" style="color:var(--green);font-weight:700;">Wibagiwe umubare-banga?</a>
        </div>

      </form>
    </div>
  </div>
</section>
