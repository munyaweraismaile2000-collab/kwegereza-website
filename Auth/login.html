          Fungura

         <div style="display:flex;justify-content:center;align-items:center;margin-bottom:20px;margin-top: 20px; font-size:13px;">

      </form>
    </div>

<!-- SEARCH MODAL -->
<div id="searchModal" class="search-modal">
  <div class="search-box">
    <span class="close-search" id="closeSearch">&times;</span>
    
    <h3>Shakisha</h3>
    
    <input type="text" placeholder="Andika icyo ushaka..." id="searchInput">
    
    <button onclick="performSearch()">Shaka</button>
  </div>
</div>

<script>
const searchBtn = document.getElementById("searchBtn");
const searchModal = document.getElementById("searchModal");
const closeSearch = document.getElementById("closeSearch");
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

// Example data
const data = [
  "Amasomo ya Islam",
  "Qur'an",
  "Hadith",
  "Videos za Amasomo",
  "Ibitabo by'Islam",
  "Audio Lectures",
  "Twandikire"
];

// Open modal
searchBtn.addEventListener("click", () => {
  searchModal.classList.remove("hidden");
  searchModal.classList.add("flex");
  searchInput.value = "";
  searchResults.innerHTML = "";
  searchInput.focus();
});

// Close modal
closeSearch.addEventListener("click", () => {
  searchModal.classList.add("hidden");
  searchModal.classList.remove("flex");
});

// Close modal when clicking outside
window.addEventListener("click", (e) => {
  if (e.target === searchModal) {
    searchModal.classList.add("hidden");
    searchModal.classList.remove("flex");
  }
});

// Live search function
function liveSearch() {
  const query = searchInput.value.trim().toLowerCase();
  if (!query) {
    searchResults.innerHTML = "";
    return;
  }

  const matches = data.filter(item => item.toLowerCase().includes(query));

  if (matches.length === 0) {
    searchResults.innerHTML = "<p class='text-red-500 p-2'>Nta makuru ari mububiko</p>";
  } else {
    searchResults.innerHTML = matches.map(item => 
      `<p class="p-2 border-b hover:bg-gray-100 cursor-pointer">${item}</p>`
    ).join("");
  }
}

// Trigger live search on typing
searchInput.addEventListener("input", liveSearch);

// Optional: click suggestion
searchResults.addEventListener("click", (e) => {
  if (e.target.tagName === "P") {
    searchInput.value = e.target.textContent;
    searchResults.innerHTML = "";
  }
});
</script>


<script src="../assets/script.js"></script>
